<html>
    <head>
        <title>Student Enrollment Form</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
        <!-- jQuery library -->
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
        

    </head>
    <body>
        <div class="container">
            <div class="page-header text-center">
                <h2>Student Enrollment Form</h2>
            </div>
            <form id="enrollForm" method="get">
                <div class="form-group">
                    <label>Roll-No :</label>
                    <input type="text" id="rollNo" class="form-control" onchange="getRollNo()">
                </div>
                <div class="form-group">
                    <label>Full Name :</label>
                    <input type="text" id="fullName" class="form-control">
                </div>
                <div class="form-group">
                    <label>Class :</label>
                    <input type="text" id="cls" class="form-control">
                </div>
                <div class="form-group">
                    <label>Birth-Date :</label>
                    <input type="date" id="birthDate" class="form-control">
                </div>
                <div class="form-group">
                    <label>Address :</label>
                    <input type="text" id="address" class="form-control">
                </div>
                <div class="form-group">
                    <label>Enrollment-Date :</label>
                    <input type="date" id="enrollDate" class="form-control">
                </div>
                <div class="form-group text-center">
                    <button type="button"    onclick="saveData()"   disabled>Save</button>
                    <button type="button"   onclick="updateData()" disabled>Update</button>
                    <button type="button"    onclick="resetForm()"  disabled>Reset</button>
                </div>
            </form>
        </div>
        <script type="text/javascript" src="http://login2explore.com/jpdb/resources/js/0.0.3/jpdb-commons.js"></script>
        <script type="text/javascript" src="js/index.js"></script>
    </body>
</html>
